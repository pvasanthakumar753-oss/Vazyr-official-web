<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAZYR | Coming Soon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="/images /logo.png" alt="VAZYR Logo" class="logo">
        
        <h1>THE FUTURE IS LOADING....</h1>
        <p>நாங்கள் ஒரு பிரம்மாண்டமான படைப்போடு மிக விரைவில் வருகிறோம்.</p>

        <div class="countdown">
            <div class="time-box"><span id="days">00</span><small>Days</small></div>
            <div class="time-box"><span id="hours">00</span><small>Hours</small></div>
            <div class="time-box"><span id="minutes">00</span><small>Mins</small></div>
            <div class="time-box"><span id="seconds">00</span><small>Secs</small></div>
        </div>

        <form id="notifyForm" class="notify-form">
            <input type="email" name="email" placeholder="உங்கள் மின்னஞ்சலை உள்ளிடவும்" required>
            <button type="submit" id="submitBtn">NOTIFY ME</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
